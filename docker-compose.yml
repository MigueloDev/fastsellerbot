services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: sh -c 'redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD:-__pass__}"'
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-__pass__}"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD:-__pass__}\" ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - 6385:6379
    volumes:
      - redis_data:/data

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    ports:
      - "3600:3600"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:-__pass__}"
    volumes:
      - .:/app
    command: pnpm dev
    stdin_open: true
    tty: true

volumes:
  redis_data:
